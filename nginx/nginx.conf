server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    # ---- Django REST API ----
    # `^~` makes nginx prefer this prefix match over any regex location and
    # short-circuits the catch-all `/` so there's no chance the React SPA
    # gets a chance to handle these URLs.
    location ^~ /api/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:9000/api/;
    }
    # Redirect bare `/api` → `/api/` (Django's APPEND_SLASH equivalent at the proxy).
    location = /api {
        return 301 /api/;
    }

    # ---- Django admin ----
    location ^~ /admin/ {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:9000/admin/;
    }
    location = /admin {
        return 301 /admin/;
    }

    # ---- User-uploaded media (cat photos) ----
    location /media/ {
        alias /media/;
        access_log off;
        expires 30d;
    }

    # ---- React SPA + collected static ----
    # The shared "static" volume contains both:
    #   * frontend build output (index.html, static/js/..., static/css/...)
    #   * backend collected static (admin/, rest_framework/, drf-yasg/, ...)
    # so a single root works for both.
    location / {
        alias /static/;
        try_files $uri $uri/ /index.html;
    }
}
